app = "traininglog-rikard"
primary_region = "arn"

[build]

[env]
  ConnectionStrings__DefaultConnection = "Data Source=/data/traininglog.db"

[[mounts]]
  source = "traininglog_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
