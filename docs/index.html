<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrainingLog</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="login-section">
    <div class="card">
      <h1>TrainingLog</h1>
      <form id="login-form">
        <input type="text" id="username" placeholder="Username" autocomplete="username" required>
        <input type="password" id="password" placeholder="Password" autocomplete="current-password" required>
        <button type="submit">Log in</button>
        <p id="login-error" class="error"></p>
      </form>
    </div>
  </div>

  <div id="app-section" hidden>
    <header>
      <h1>TrainingLog</h1>
      <div class="header-right">
        <span id="user-info"></span>
        <button id="logout-btn" class="secondary">Log out</button>
      </div>
    </header>

    <main>
      <section class="card">
        <h2>Workout Types</h2>

        <table id="types-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Fields</th>
              <th></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>

        <div id="type-form-section" hidden>
          <h3 id="type-form-title">New Workout Type</h3>
          <form id="type-form">
            <input type="text" id="type-name" placeholder="Type name" required>
            <div id="fields-container"></div>
            <button type="button" id="add-field-btn" class="secondary">+ Add field</button>
            <div class="form-actions">
              <button type="submit" id="type-submit-btn">Create</button>
              <button type="button" id="type-cancel-btn" class="secondary" hidden>Cancel</button>
            </div>
            <p id="type-error" class="error"></p>
          </form>
        </div>
      </section>
      <section id="users-section" class="card" hidden>
        <h2>Users</h2>

        <table id="users-table">
          <thead>
            <tr>
              <th>Username</th>
              <th>Role</th>
              <th></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>

        <div id="user-form-section" hidden>
          <h3 id="user-form-title">New User</h3>
          <form id="user-form">
            <input type="text" id="user-username" placeholder="Username" required>
            <input type="password" id="user-password" placeholder="Password">
            <small id="user-password-hint" hidden>Leave blank to keep current password</small>
            <select id="user-role">
              <option value="user">user</option>
              <option value="admin">admin</option>
            </select>
            <div class="form-actions">
              <button type="submit" id="user-submit-btn">Create</button>
              <button type="button" id="user-cancel-btn" class="secondary" hidden>Cancel</button>
            </div>
            <p id="user-error" class="error"></p>
          </form>
        </div>
      </section>

      <section id="sessions-section" class="card">
        <h2>My Sessions</h2>

        <table id="sessions-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Type</th>
              <th>Values</th>
              <th>Notes</th>
              <th></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>

        <div id="session-form-section">
          <h3 id="session-form-title">Log Session</h3>
          <form id="session-form">
            <input type="datetime-local" id="session-date" required>
            <select id="session-type" required>
              <option value="">— Select type —</option>
            </select>
            <div id="session-fields"></div>
            <input type="text" id="session-notes" placeholder="Notes (optional)">
            <div class="form-actions">
              <button type="submit" id="session-submit-btn">Log session</button>
              <button type="button" id="session-cancel-btn" class="secondary" hidden>Cancel</button>
            </div>
            <p id="session-error" class="error"></p>
          </form>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
